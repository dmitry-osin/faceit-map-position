<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faceit Map Position</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body class="theme-dark">
  <div class="container">
    <header class="header">
      <div class="header-top">
        <div class="logo">
          <span class="logo-icon">🎯</span>
          <div>
            <h1>Map Position</h1>
            <span class="logo-sub">Faceit Auto Chat</span>
          </div>
        </div>
        <div class="header-switchers">
          <button class="lang-btn" id="lang-btn" title="Switch language">EN</button>
          <div class="theme-switcher">
            <button class="theme-btn" data-theme="light" title="Light">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            </button>
            <button class="theme-btn active" data-theme="dark" title="Dark">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
            <button class="theme-btn" data-theme="neon" title="Neon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            </button>
          </div>
        </div>
      </div>
    </header>

    <div class="card">
      <label class="switch-row">
        <div class="switch">
          <input type="checkbox" id="enabled" checked>
          <span class="switch-track"></span>
        </div>
        <div class="switch-label">
          <span class="switch-title" data-i18n="enabledTitle">Extension active</span>
          <span class="switch-desc" data-i18n="enabledDesc">Auto-send position to chat</span>
        </div>
      </label>
    </div>

    <div class="card">
      <div class="card-header">
        <h2 data-i18n="mapSettings">Map Settings</h2>
        <span class="card-badge" id="map-count">0 maps</span>
      </div>
      <div id="maps-list"></div>
      <button id="add-map" class="btn btn-outline">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span data-i18n="addMap">Add map</span>
      </button>
    </div>

    <div class="actions">
      <button id="save" class="btn btn-primary" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        <span data-i18n="save">Save</span>
      </button>
      <button id="reset" class="btn btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        <span data-i18n="reset">Reset</span>
      </button>
    </div>

    <div id="status" class="status"></div>

    <div class="modal-overlay" id="modal">
      <div class="modal-card">
        <div class="modal-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/></svg>
        </div>
        <p class="modal-text" data-i18n="resetConfirm">Reset all settings?</p>
        <div class="modal-actions">
          <button class="btn btn-secondary" id="modal-cancel" data-i18n="cancel">Cancel</button>
          <button class="btn btn-primary" id="modal-confirm" data-i18n="reset">Reset</button>
        </div>
      </div>
    </div>

    <footer class="footer">
      <span>by Dmitry Osin</span>
      <a href="https://github.com/dmitry-osin/faceit-map-position" target="_blank" rel="noopener">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
        <span>github.com/dmitry-osin/faceit-map-position</span>
      </a>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
